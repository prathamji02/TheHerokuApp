name: UI Automation Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm ci

    - name: Run Cucumber Tests (Headless)
      # Note: For GitHub actions, the browser must run in headless mode. 
      # Ensure your hooks.js supports headless Edge/Chrome arguments!
      run: npm test
      env:
        CI: true